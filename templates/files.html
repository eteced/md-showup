<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Showup - Files</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay" style="display:none">
        <div class="login-card">
            <div class="login-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <h2>MD Showup</h2>
            <p class="login-subtitle">Enter your API key to continue</p>
            <form id="login-form">
                <input type="password" id="api-key-input" placeholder="API Key" autocomplete="off">
                <button type="submit">Sign In</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- File List Page -->
    <div class="file-page">
        <div class="page-header">
            <div class="page-header-left">
                <span class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </span>
                <span class="page-title">MD Showup</span>
            </div>
            <span class="page-subtitle">Markdown File Browser</span>
        </div>
        <div class="table-wrapper" id="table-wrapper">
            <table id="file-table">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="name" style="width:50%">
                            <span class="th-inner"><svg class="th-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Name <span class="sort-indicator"></span></span>
                        </th>
                        <th class="sortable" data-sort="mtime" style="width:30%">
                            <span class="th-inner"><svg class="th-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Modified <span class="sort-indicator"></span></span>
                        </th>
                        <th class="sortable" data-sort="size" style="width:20%">
                            <span class="th-inner"><svg class="th-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Size <span class="sort-indicator"></span></span>
                        </th>
                    </tr>
                </thead>
                <tbody id="file-tbody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/file-list.js"></script>
    <script src="/static/js/files-page.js"></script>
</body>
</html>
